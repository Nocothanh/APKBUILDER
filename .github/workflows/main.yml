name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile (preview | production)'
        required: false
        default: 'preview'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install EAS CLI
        run: npm install -g eas-cli expo-cli

      - name: Install dependencies
        run: npm install

      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --output ./build/app.apk || true

      - name: Download APK from EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p build
          BUILD_URL=$(eas build:list \
            --platform android \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null | \
            node -e "
              const d=require('fs').readFileSync('/dev/stdin','utf8');
              const b=JSON.parse(d);
              console.log(b[0]?.artifacts?.buildUrl || '');
            ")
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o build/app.apk
            echo "APK scaricato: build/app.apk"
          else
            echo "Nessun URL trovato, APK già nella cartella build."
          fi
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk-${{ github.run_number }}
          path: |
            build/*.apk
            android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "APK Build #${{ github.run_number }}"
          body: |
            🤖 Build automatico generato da GitHub Actions
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Data: `${{ github.event.head_commit.timestamp }}`
          files: |
            build/*.apk
            android/app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
