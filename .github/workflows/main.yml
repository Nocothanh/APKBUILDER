name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile (preview | production)'
        required: false
        default: 'preview'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del codice ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Setup Java (richiesto da Gradle) ─────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Setup Expo & EAS CLI ─────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli expo-cli

      # ── 5. Installa dipendenze progetto ─────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Build APK via EAS (cloud build) ─────────────────────────────────
      #   Richiede EXPO_TOKEN nei GitHub Secrets
      #   Il profilo "preview" genera un APK scaricabile direttamente
      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --output ./build/app.apk || true

      # ── 7. (Alternativa locale) Build APK senza EAS cloud ───────────────────
      #   Decommentare questa sezione e commentare il blocco EAS sopra
      #   per buildare interamente in locale sul runner GitHub
      # - name: Build APK locally (no EAS cloud)
      #   run: |
      #     cd android
      #     chmod +x gradlew
      #     ./gradlew assembleRelease --no-daemon
      #     mkdir -p ../build
      #     find . -name "*.apk" -exec cp {} ../build/app-release.apk \;

      # ── 8. Scarica APK dall'ultimo build EAS (se si usa cloud) ──────────────
      - name: Download APK from EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p build
          # Recupera l'URL dell'ultimo build e scaricalo
          BUILD_URL=$(eas build:list \
            --platform android \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null | \
            node -e "
              const d=require('fs').readFileSync('/dev/stdin','utf8');
              const b=JSON.parse(d);
              console.log(b[0]?.artifacts?.buildUrl || '');
            ")
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o build/app.apk
            echo "APK scaricato: build/app.apk"
          else
            echo "Nessun URL trovato, APK già nella cartella build."
          fi
        continue-on-error: true

      # ── 9. Upload APK come artifact di GitHub ───────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk-${{ github.run_number }}
          path: |
            build/*.apk
            android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 10. (Opzionale) Crea una GitHub Release con l'APK allegato ──────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "APK Build #${{ github.run_number }}"
          body: |
            🤖 Build automatico generato da GitHub Actions
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Data: `${{ github.event.head_commit.timestamp }}`
          files: |
            build/*.apk
            android/app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
